name: 1Password
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Passwords
  - Password Manager
  - Security
description: >-
  1Password is a password manager that helps individuals and businesses securely
  store and manage passwords, credentials, and sensitive information. The
  1Password Partnership API enables partners to manage provisioning and
  deprovisioning of third-party partner billing accounts for customers,
  supporting individual and family account types.
created: '2025-02-08'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: 1password:1password-partnership-api
    name: 1Password Partnership API
    tags:
      - Passwords
      - Billing
      - Partners
    humanURL: https://developer.1password.com/docs/partnership-api/reference/
    baseURL: https://billing.b5test.eu/api/v1
    properties:
      - url: https://developer.1password.com/docs/partnership-api/reference/
        type: Documentation
    description: >-
      You can use the 1Password Partnership API to manage the provisioning and
      deprovisioning of third-party partner billing accounts for your customers.
      The API supports partner billing accounts for 1Password individual and
      family accounts. The Partnership API does not support 1Password team or
      business accounts.
