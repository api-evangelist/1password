naftiko: 1.0.0-alpha2
info:
  label: 1Password Secrets Management
  description: Unified secrets management and security monitoring workflow for 1Password. Combines the Connect Server API
    (vault and item management), Events API (audit log and sign-in monitoring), and Partnership API (account provisioning)
    into a single workflow for DevOps engineers, security operations teams, and 1Password partners.
  tags:
  - Security
  - Passwords
  - Secrets
  - DevOps
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    CONNECT_TOKEN: CONNECT_TOKEN
    EVENTS_TOKEN: EVENTS_TOKEN
    PARTNERSHIP_TOKEN: PARTNERSHIP_TOKEN
capability:
  consumes:
  - type: http
    namespace: 1password-connect
    baseUri: http://localhost:8080/v1
    description: 1Password Connect API
    authentication:
      type: bearer
      token: '{{CONNECT_TOKEN}}'
    resources:
    - name: vaults
      path: /v1/vaults
      description: Vaults operations
      operations:
      - name: get-v1-vaults
        method: GET
        description: 1Password List Vaults
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-v1-vaults-vaultUuid
        method: GET
        description: 1Password Get Vault Details
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: items
      path: /v1/vaults/{vaultUuid}/items
      description: Items operations
      operations:
      - name: get-v1-vaults-vaultUuid-items
        method: GET
        description: 1Password List Items in a Vault
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post-v1-vaults-vaultUuid-items
        method: POST
        description: 1Password Create a New Item
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: get-v1-vaults-vaultUuid-items-itemUuid
        method: GET
        description: 1Password Get Item Details
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put-v1-vaults-vaultUuid-items-itemUuid
        method: PUT
        description: 1Password Replace an Item
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: patch-v1-vaults-vaultUuid-items-itemUuid
        method: PATCH
        description: 1Password Update an Item
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: delete-v1-vaults-vaultUuid-items-itemUuid
        method: DELETE
        description: 1Password Delete an Item
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files
      path: /v1/vaults/{vaultUuid}/items/{itemUuid}/files
      description: Files operations
      operations:
      - name: get-v1-vaults-vaultUuid-items-itemUuid-files
        method: GET
        description: 1Password List Files Attached to an Item
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: inline_files
          in: query
          type: boolean
          required: false
          description: When set to true, file content is included inline in the response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-v1-vaults-vaultUuid-items-itemUuid-files-fileUuid
        method: GET
        description: 1Password Get File Details
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: inline_files
          in: query
          type: boolean
          required: false
          description: When set to true, file content is included inline in the response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-v1-vaults-vaultUuid-items-itemUuid-files-fileUuid-content
        method: GET
        description: 1Password Get File Content
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: activity
      path: /v1/activity
      description: Activity operations
      operations:
      - name: get-v1-activity
        method: GET
        description: 1Password List API Activity
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of activity records to return.
        - name: offset
          in: query
          type: integer
          required: false
          description: Number of activity records to skip before returning results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: health
      path: /heartbeat
      description: Health operations
      operations:
      - name: get-heartbeat
        method: GET
        description: 1Password Check Server Status
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-health
        method: GET
        description: 1Password Get Server Health
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics
      path: /metrics
      description: Metrics operations
      operations:
      - name: get-metrics
        method: GET
        description: 1Password Get Server Metrics
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: 1password-events
    baseUri: https://events.1password.com
    description: 1Password Events API
    authentication:
      type: bearer
      token: '{{EVENTS_TOKEN}}'
    resources:
    - name: sign-in-attempts
      path: /api/v2/signinattempts
      description: Sign-In Attempts operations
      operations:
      - name: post-api-v2-signinattempts
        method: POST
        description: 1Password List Sign-in Attempts
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
    - name: item-usages
      path: /api/v2/itemusages
      description: Item Usages operations
      operations:
      - name: post-api-v2-itemusages
        method: POST
        description: 1Password List Item Usages
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
    - name: audit-events
      path: /api/v2/auditevents
      description: Audit Events operations
      operations:
      - name: post-api-v2-auditevents
        method: POST
        description: 1Password List Audit Events
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
    - name: introspection
      path: /api/v1/introspect
      description: Introspection operations
      operations:
      - name: get-api-v1-introspect
        method: GET
        description: 1Password Introspect Authentication Token
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: 1password-partnership
    baseUri: https://billing.b5test.eu/api/v1
    description: 1Password Partnership API
    authentication:
      type: bearer
      token: '{{PARTNERSHIP_TOKEN}}'
    resources:
    - name: accounts
      path: /partners/accounts
      description: Accounts operations
      operations:
      - name: post-partners-accounts
        method: POST
        description: 1Password Create a Partner Billing Account
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: get-partners-accounts-accountUid
        method: GET
        description: 1Password Get Partner Billing Account Details
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch-partners-accounts-accountUid
        method: PATCH
        description: 1Password Update a Partner Billing Account
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: delete-partners-accounts-accountUid
        method: DELETE
        description: 1Password Delete a Partner Billing Account
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: 1password-secrets-api
    description: Unified REST API for 1Password secrets management.
    resources:
    - path: /v1/vaults
      name: vaults
      description: Manage 1Password vaults.
      operations:
      - method: GET
        name: list-vaults
        description: List all accessible vaults.
        call: 1password-connect.get---vaults
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vaults/{vaultId}/items
      name: items
      description: Manage items within a vault.
      operations:
      - method: GET
        name: list-items
        description: List all items in a vault.
        call: 1password-connect.get---vaults--vaultUuid--items
        with:
          vaultUuid: rest.vaultId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-item
        description: Create a new item in a vault.
        call: 1password-connect.post---vaults--vaultUuid--items
        with:
          vaultUuid: rest.vaultId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/sign-ins
      name: sign-in-events
      description: Retrieve sign-in audit events.
      operations:
      - method: POST
        name: get-sign-in-events
        description: Retrieve sign-in attempt events for security monitoring.
        call: 1password-events.post--api-v1-signinattempts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/item-usage
      name: item-usage-events
      description: Retrieve item usage audit events.
      operations:
      - method: POST
        name: get-item-usage-events
        description: Retrieve item usage events for compliance and auditing.
        call: 1password-events.post--api-v1-itemusages
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts
      name: partner-accounts
      description: Manage partner billing accounts.
      operations:
      - method: POST
        name: create-account
        description: Provision a new 1Password account for a partner customer.
        call: 1password-partnership.post---accounts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: 1password-secrets-mcp
    transport: http
    description: MCP server for AI-assisted 1Password secrets management and security monitoring.
    tools:
    - name: list-vaults
      description: List all 1Password vaults accessible to the Connect Server.
      hints:
        readOnly: true
        openWorld: false
      call: 1password-connect.get---vaults
      outputParameters:
      - type: object
        mapping: $.
    - name: list-vault-items
      description: List all items stored in a specific 1Password vault.
      hints:
        readOnly: true
        openWorld: false
      call: 1password-connect.get---vaults--vaultUuid--items
      outputParameters:
      - type: object
        mapping: $.
    - name: get-item
      description: Get a specific item from a 1Password vault.
      hints:
        readOnly: true
        openWorld: false
      call: 1password-connect.get---vaults--vaultUuid--items--itemUuid-
      outputParameters:
      - type: object
        mapping: $.
    - name: create-item
      description: Create a new item in a 1Password vault.
      hints:
        readOnly: false
        destructive: false
      call: 1password-connect.post---vaults--vaultUuid--items
      outputParameters:
      - type: object
        mapping: $.
    - name: update-item
      description: Update an existing item in a 1Password vault.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: 1password-connect.put---vaults--vaultUuid--items--itemUuid-
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-item
      description: Delete an item from a 1Password vault.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: 1password-connect.delete---vaults--vaultUuid--items--itemUuid-
      outputParameters:
      - type: object
        mapping: $.
    - name: get-sign-in-events
      description: Retrieve 1Password sign-in attempt events for security monitoring.
      hints:
        readOnly: true
        openWorld: false
      call: 1password-events.post--api-v1-signinattempts
      outputParameters:
      - type: object
        mapping: $.
    - name: get-item-usage-events
      description: Retrieve 1Password item usage events for compliance auditing.
      hints:
        readOnly: true
        openWorld: false
      call: 1password-events.post--api-v1-itemusages
      outputParameters:
      - type: object
        mapping: $.
    - name: get-audit-events
      description: Retrieve 1Password audit events for compliance reporting.
      hints:
        readOnly: true
        openWorld: false
      call: 1password-events.post--api-v1-auditevents
      outputParameters:
      - type: object
        mapping: $.
    - name: list-api-activity
      description: List all API requests made to the 1Password Connect Server.
      hints:
        readOnly: true
        openWorld: false
      call: 1password-connect.get--v1-activity
      outputParameters:
      - type: object
        mapping: $.
    - name: provision-partner-account
      description: Provision a new 1Password account for a partner customer.
      hints:
        readOnly: false
        destructive: false
      call: 1password-partnership.post---accounts
      outputParameters:
      - type: object
        mapping: $.
