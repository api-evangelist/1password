naftiko: 1.0.0-alpha2
info:
  label: 1Password Connect Server API — Health
  description: '1Password Connect Server API — Health. 2 operations. Lead operation: 1Password Get Server Health. Self-contained
    Naftiko capability covering one 1password business surface.'
  tags:
  - 1password
  - Health
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    1PASSWORD_API_KEY: 1PASSWORD_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-health
    baseUri: http://localhost:8080
    description: 1Password Connect Server API — Health business capability. Self-contained, no shared references.
    resources:
    - name: health
      path: /health
      operations:
      - name: gethealth
        method: GET
        description: 1Password Get Server Health
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: heartbeat
      path: /heartbeat
      operations:
      - name: getheartbeat
        method: GET
        description: 1Password Check Server Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.1PASSWORD_API_KEY}}'
  exposes:
  - type: rest
    namespace: connect-health-rest
    port: 8080
    description: REST adapter for 1Password Connect Server API — Health. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/health
      name: health
      description: REST surface for health.
      operations:
      - method: GET
        name: gethealth
        description: 1Password Get Server Health
        call: connect-health.gethealth
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/heartbeat
      name: heartbeat
      description: REST surface for heartbeat.
      operations:
      - method: GET
        name: getheartbeat
        description: 1Password Check Server Status
        call: connect-health.getheartbeat
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-health-mcp
    port: 9090
    transport: http
    description: MCP adapter for 1Password Connect Server API — Health. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: 1password-get-server-health
      description: 1Password Get Server Health
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-health.gethealth
      outputParameters:
      - type: object
        mapping: $.
    - name: 1password-check-server-status
      description: 1Password Check Server Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-health.getheartbeat
      outputParameters:
      - type: object
        mapping: $.
