naftiko: 1.0.0-alpha2
info:
  label: 1Password Connect Server API — Metrics
  description: '1Password Connect Server API — Metrics. 1 operations. Lead operation: 1Password Get Server Metrics. Self-contained
    Naftiko capability covering one 1password business surface.'
  tags:
  - 1password
  - Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    1PASSWORD_API_KEY: 1PASSWORD_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-metrics
    baseUri: http://localhost:8080
    description: 1Password Connect Server API — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: metrics
      path: /metrics
      operations:
      - name: getmetrics
        method: GET
        description: 1Password Get Server Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.1PASSWORD_API_KEY}}'
  exposes:
  - type: rest
    namespace: connect-metrics-rest
    port: 8080
    description: REST adapter for 1Password Connect Server API — Metrics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/metrics
      name: metrics
      description: REST surface for metrics.
      operations:
      - method: GET
        name: getmetrics
        description: 1Password Get Server Metrics
        call: connect-metrics.getmetrics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for 1Password Connect Server API — Metrics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: 1password-get-server-metrics
      description: 1Password Get Server Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-metrics.getmetrics
      outputParameters:
      - type: object
        mapping: $.
