naftiko: 1.0.0-alpha2
info:
  label: 1Password Connect Server API — Vaults
  description: '1Password Connect Server API — Vaults. 2 operations. Lead operation: 1Password List Vaults. Self-contained
    Naftiko capability covering one 1password business surface.'
  tags:
  - 1password
  - Vaults
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    1PASSWORD_API_KEY: 1PASSWORD_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-vaults
    baseUri: http://localhost:8080
    description: 1Password Connect Server API — Vaults business capability. Self-contained, no shared references.
    resources:
    - name: v1-vaults
      path: /v1/vaults
      operations:
      - name: listvaults
        method: GET
        description: 1Password List Vaults
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-vaults-vaultUuid
      path: /v1/vaults/{vaultUuid}
      operations:
      - name: getvaultbyid
        method: GET
        description: 1Password Get Vault Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.1PASSWORD_API_KEY}}'
  exposes:
  - type: rest
    namespace: connect-vaults-rest
    port: 8080
    description: REST adapter for 1Password Connect Server API — Vaults. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/vaults
      name: v1-vaults
      description: REST surface for v1-vaults.
      operations:
      - method: GET
        name: listvaults
        description: 1Password List Vaults
        call: connect-vaults.listvaults
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/vaults/{vaultuuid}
      name: v1-vaults-vaultuuid
      description: REST surface for v1-vaults-vaultUuid.
      operations:
      - method: GET
        name: getvaultbyid
        description: 1Password Get Vault Details
        call: connect-vaults.getvaultbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-vaults-mcp
    port: 9090
    transport: http
    description: MCP adapter for 1Password Connect Server API — Vaults. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: 1password-list-vaults
      description: 1Password List Vaults
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-vaults.listvaults
      outputParameters:
      - type: object
        mapping: $.
    - name: 1password-get-vault-details
      description: 1Password Get Vault Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-vaults.getvaultbyid
      outputParameters:
      - type: object
        mapping: $.
