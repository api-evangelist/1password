naftiko: 1.0.0-alpha2
info:
  label: 1Password Events API — Item Usages
  description: '1Password Events API — Item Usages. 1 operations. Lead operation: 1Password List Item Usages. Self-contained
    Naftiko capability covering one 1password business surface.'
  tags:
  - 1password
  - Item Usages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    1PASSWORD_API_KEY: 1PASSWORD_API_KEY
capability:
  consumes:
  - type: http
    namespace: events-item-usages
    baseUri: https://events.1password.com
    description: 1Password Events API — Item Usages business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-itemusages
      path: /api/v2/itemusages
      operations:
      - name: listitemusagesv2
        method: POST
        description: 1Password List Item Usages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.1PASSWORD_API_KEY}}'
  exposes:
  - type: rest
    namespace: events-item-usages-rest
    port: 8080
    description: REST adapter for 1Password Events API — Item Usages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/itemusages
      name: api-v2-itemusages
      description: REST surface for api-v2-itemusages.
      operations:
      - method: POST
        name: listitemusagesv2
        description: 1Password List Item Usages
        call: events-item-usages.listitemusagesv2
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: events-item-usages-mcp
    port: 9090
    transport: http
    description: MCP adapter for 1Password Events API — Item Usages. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: 1password-list-item-usages
      description: 1Password List Item Usages
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: events-item-usages.listitemusagesv2
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
