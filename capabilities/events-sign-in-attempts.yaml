      name: api-v2-signinattempts
      description: REST surface for api-v2-signinattempts.
      operations:
      - method: POST
        name: listsigninattemptsv2
        description: 1Password List Sign-in Attempts
        call: events-sign-in-attempts.listsigninattemptsv2
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
