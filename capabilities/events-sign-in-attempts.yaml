    resources:
    - name: api-v2-signinattempts
      path: /api/v2/signinattempts
      operations:
      - name: listsigninattemptsv2
        method: POST
        description: 1Password List Sign-in Attempts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
