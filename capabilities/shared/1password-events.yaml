naftiko: 1.0.0-alpha1
info:
  label: 1Password Events API
  description: The 1Password Events API provides programmatic access to event data
    generated within a 1Password account. It enables security teams and administrators
    to retrieve sign-in attempts, item usage records,
  tags:
  - Security
  - Passwords
  - Events
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    EVENTS_TOKEN: EVENTS_TOKEN
capability:
  consumes:
  - type: http
    namespace: 1password-events
    baseUri: https://events.1password.com
    description: 1Password Events API
    authentication:
      type: bearer
      token: '{{EVENTS_TOKEN}}'
    resources:
    - name: sign-in-attempts
      path: /api/v2/signinattempts
      description: Sign-In Attempts operations
      operations:
      - name: post-api-v2-signinattempts
        method: POST
        description: 1Password List Sign-in Attempts
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
    - name: item-usages
      path: /api/v2/itemusages
      description: Item Usages operations
      operations:
      - name: post-api-v2-itemusages
        method: POST
        description: 1Password List Item Usages
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
    - name: audit-events
      path: /api/v2/auditevents
      description: Audit Events operations
      operations:
      - name: post-api-v2-auditevents
        method: POST
        description: 1Password List Audit Events
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
    - name: introspection
      path: /api/v1/introspect
      description: Introspection operations
      operations:
      - name: get-api-v1-introspect
        method: GET
        description: 1Password Introspect Authentication Token
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
