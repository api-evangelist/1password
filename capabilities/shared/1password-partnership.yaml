naftiko: 1.0.0-alpha1
info:
  label: 1Password Partnership API
  description: The 1Password Partnership API enables partners to manage the provisioning
    and deprovisioning of third-party partner billing accounts for customers. Partners
    can create billing accounts, retrieve accou
  tags:
  - Security
  - Passwords
  - Partnership
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    PARTNERSHIP_TOKEN: PARTNERSHIP_TOKEN
capability:
