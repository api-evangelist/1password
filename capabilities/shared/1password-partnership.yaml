    namespace: 1password-partnership
    baseUri: https://billing.b5test.eu/api/v1
    description: 1Password Partnership API
    authentication:
      type: bearer
      token: '{{PARTNERSHIP_TOKEN}}'
    resources:
    - name: accounts
      path: /partners/accounts
      description: Accounts operations
      operations:
      - name: post-partners-accounts
        method: POST
        description: 1Password Create a Partner Billing Account
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: get-partners-accounts-accountUid
        method: GET
        description: 1Password Get Partner Billing Account Details
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch-partners-accounts-accountUid
        method: PATCH
        description: 1Password Update a Partner Billing Account
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: delete-partners-accounts-accountUid
        method: DELETE
        description: 1Password Delete a Partner Billing Account
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
