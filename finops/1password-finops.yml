specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: 1Password
providerId: 1password
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Password Manager
  - Security
  - Secrets
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for 1Password — per-seat, per-month subscription billing across business
  plans. APIs (Connect, Events, SCIM, Service Accounts) are entitlements of the seat plan rather than
  metered services; there is no per-call charge.
sources:
  - https://1password.com/business-pricing
  - https://developer.1password.com/docs/events-api/rate-limits/
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: AgileBits Inc.
serviceCategory: Identity
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Refund
focusColumns:
  ServiceName: 1Password
  ServiceCategory: Identity
  ProviderName: 1Password
  PublisherName: AgileBits Inc.
  InvoiceIssuerName: AgileBits Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription
  PricingUnit: seat-month
meters:
  - name: seat_month
    description: Active billable user seats per month (Business, Teams Starter, Individual, Families).
    unit: seat
    aggregation: sum
    dimensions:
      - plan
      - billing_period
      - region
  - name: family_account_month
    description: Flat family-plan billing unit (single charge regardless of family size up to 5).
    unit: month
    aggregation: count
    dimensions:
      - plan
  - name: events_api_calls
    description: Audit / sign-in event API requests (entitlement metric — not separately billed but governed
      by 600/min and 30k/hour ceilings).
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - account
  - name: connect_servers_active
    description: Number of self-hosted Connect Server instances (entitlement metric for fair-use planning).
    unit: instance
    aggregation: count
    dimensions:
      - account
principles:
  - name: Visibility
    description: Use the 1Password admin console seat report and the Events API to track active vs licensed
      seats and identify dormant accounts before renewal.
  - name: Allocation
    description: Tag vaults and groups by team / cost center; use the Business plan's group structure to
      attribute seat costs to consuming teams.
  - name: Optimization
    description: Right-size by deactivating unused seats before the annual renewal anniversary; consolidate
      family-plan licenses into business plans only when individual usage justifies the shift.
  - name: Accountability
    description: Designate a security/IT owner for license counts and a finance owner for the annual renewal;
      review seat utilization quarterly via Watchtower and SCIM provisioning logs.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
