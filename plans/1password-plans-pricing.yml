specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: 1Password
providerId: 1password
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Password Manager
  - Passwords
  - Security
  - Secrets
description: 1Password is sold as a per-user/per-month subscription with consumer (Individual, Families)
  and business (Teams Starter Pack, Business, Enterprise) tiers. APIs (Connect Server, Events, SCIM,
  Service Accounts) are bundled into the business plans rather than priced as a separate developer SKU;
  there is no published per-call pricing or pay-as-you-go API tier. Annual billing is the default.
sources:
  - https://1password.com/business-pricing
  - https://1password.com/pricing
  - https://developer.1password.com/docs/events-api/rate-limits/
plans:
  - id: 1password-individual
    name: Individual
    type: subscription
    description: Single-user consumer plan; billed annually.
    entries:
      - label: Per user monthly
        name: seat_monthly
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '3.99'
        userMultiplied: true
    elements:
      - name: Unlimited passwords and items
      - name: Cross-device sync
      - name: Watchtower breach alerts
      - name: 1 GB document storage
  - id: 1password-families
    name: Families
    type: subscription
    description: Up to 5 family members; billed annually.
    entries:
      - label: Family plan monthly
        name: family_monthly
        type: subscription
        metric: month
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '5.99'
        userMultiplied: false
    elements:
      - name: Up to 5 family members
      - name: Unlimited shared vaults
      - name: Admin recovery and permissions
      - name: 1 GB document storage per person
  - id: 1password-teams-starter
    name: Teams Starter Pack
    type: subscription
    description: Flat-rate small-team plan, up to 10 users; billed annually.
    entries:
      - label: Flat monthly fee
        name: starter_monthly
        type: flat
        metric: month
        limit: 10
        timeFrame: month
        geo: global
        unit: 1
        price: '19.95'
        userMultiplied: false
    elements:
      - name: Up to 10 team members
      - name: Role-based admin controls
      - name: Shared vaults
      - name: Developer tools (CLI, SSH agent)
      - name: Connect Server API access
  - id: 1password-business
    name: Business
    type: subscription
    description: Per-user business plan with SSO, advanced reporting, and full API surface; billed annually.
    entries:
      - label: Per user monthly
        name: business_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '7.99'
        userMultiplied: true
    elements:
      - name: SSO with Okta, Entra ID, OneLogin, Duo
      - name: Granular vault permissions
      - name: Watchtower advanced reporting
      - name: 5 GB document storage per user
      - name: Connect Server API
      - name: Events API
      - name: SCIM Bridge
      - name: Service Accounts
      - name: 24/7 priority email support
  - id: 1password-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced plan for large organizations; contact sales.
    entries:
      - label: Custom contract
        name: enterprise_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Dedicated account manager
      - name: Custom onboarding and training
      - name: Volume pricing
      - name: Custom DPA / data residency
      - name: All Business features
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
