specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: 1Password
providerId: 1password
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Password Manager
  - Passwords
  - Security
  - Secrets
  - Rate Limiting
description: Rate limits for 1Password developer APIs. The Events API publishes hard request ceilings
  (per-minute and per-hour). The Connect Server is self-hosted, so externally observed limits only apply
  to its initial fetch from the 1Password backend; otherwise it operates locally and caches results. SCIM
  Bridge and Service Accounts are subject to internal fair-use limits but no published numeric thresholds.
sources:
  - https://developer.1password.com/docs/events-api/rate-limits/
  - https://developer.1password.com/docs/connect/
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Events API per-minute
    scope: account
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
    notes: Applies across all Events API endpoints (sign-in attempts, item usage, audit events).
  - name: Events API per-hour
    scope: account
    metric: requests_per_hour
    limit: 30000
    timeFrame: hour
    notes: Hard ceiling per account regardless of plan.
  - name: Connect Server fair-use
    scope: account
    metric: varies
    limit: internal fair-use limits on initial secret fetch from 1Password
    notes: Self-hosted; subsequent requests are served from local cache. No published numeric ceiling.
  - name: SCIM Bridge fair-use
    scope: account
    metric: varies
    limit: internal fair-use limits, no public numeric threshold
    notes: Provisioning calls follow SCIM 2.0 patterns; bursts beyond fair use can be throttled.
policies:
  - name: Retry on 429
    description: Treat 429 as throttling; back off and retry. 1Password does not document a Retry-After
      header for the Events API, so use exponential backoff with jitter.
  - name: Pagination
    description: Use cursor-based pagination for Events API to keep request volumes inside the per-minute
      ceiling rather than fetching large batches in tight loops.
  - name: Caching for Connect Server
    description: After first fetch, secrets are cached locally; re-requests do not consume the upstream
      rate budget. Long-running deployments benefit by minimizing cold starts.
  - name: Account-scoped enforcement
    description: Limits are evaluated per 1Password account, not per token, so multiple integrations under
      one account share the same ceiling.
maintainers:
